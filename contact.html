<!-- CONTACT -->
<section id="contact">
  <div class="contact-grid">
    <div>
      <p class="section-eyebrow">Get in Touch</p>
      <h2 class="section-title">Contact ZENITH</h2>
      <div class="section-divider">
        <div class="section-divider-line"></div>
        <div class="section-divider-dot"></div>
      </div>

      <div class="contact-info">
        <div class="contact-item">
          <div class="contact-icon">📍</div>
          <div>
            <div class="contact-item-label">Address</div>
            <div class="contact-item-value">Panti, Kushtia, Bangladesh<br>A Brand of EXARISTE GROUP</div>
          </div>
        </div>
        <div class="contact-item">
          <div class="contact-icon">📞</div>
          <div>
            <div class="contact-item-label">Phone</div>
            <div class="contact-item-value"><a href="tel:+8801713366224" style="color:inherit;text-decoration:none;">+8801713366224</a></div>
          </div>
        </div>
        <div class="contact-item">
          <div class="contact-icon">✉️</div>
          <div>
            <div class="contact-item-label">Email</div>
            <div class="contact-item-value"><a href="mailto:info@exariste.com" style="color:inherit;text-decoration:none;">info@exariste.com</a></div>
          </div>
        </div>
        <div class="contact-item">
          <div class="contact-icon">🌐</div>
          <div>
            <div class="contact-item-label">Website</div>
            <div class="contact-item-value">zenith.exariste.com</div>
          </div>
        </div>
      </div>

      <div class="map-placeholder" style="cursor:pointer;" onclick="window.open('https://maps.google.com/?q=Panti,Kushtia,Bangladesh','_blank')">
        <span>🗺️</span>
        <span>Panti, Kushtia, Bangladesh — Click to View on Google Maps</span>
      </div>
    </div>

    <div class="contact-form-wrap reveal">
      <h3 class="form-title">Send an Enquiry</h3>
      <div class="form-group">
        <label>Your Name</label>
        <input type="text" placeholder="Full name">
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" placeholder="+880 ...">
      </div>
      <div class="form-group">
        <label>Interested In</label>
        <select>
          <option>Select livestock category...</option>
          <option>Cattle</option>
          <option>Goat</option>
          <option>Duck</option>
          <option>Poultry</option>
          <option>Pigeon</option>
          <option>Multiple / Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea placeholder="Tell us what you're looking for — breed, quantity, budget..."></textarea>
      </div>
      <button class="form-submit">Send Enquiry →</button>
    </div>
  </div>
</section>
